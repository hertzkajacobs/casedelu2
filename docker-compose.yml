version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: visitor_intercom
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/visitor_intercom
      JWT_SECRET: dev-secret
      VISITOR_LOG_KEY: 0123456789abcdef0123456789abcdef
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
      - "3001:3001"
      - "3002:3002"
      - "4000:4000"

volumes:
  pgdata:
